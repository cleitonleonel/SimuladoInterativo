<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulado Geral | Simulado Interativo</title>
  <link rel="icon" type="image/png" href="../assets/img/logo.png">
  <link rel="shortcut icon" href="../assets/img/favicon.ico">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
  
  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  
  <!-- Styles -->
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/simulado.css">
  <script src="../assets/js/theme.js" defer></script>
</head>
<body>
  <div class="mesh-gradient" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(at 0% 0%, rgba(79, 70, 229, 0.1) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(14, 165, 233, 0.1) 0px, transparent 50%); filter: blur(100px);"></div>

  <div id="barraInterna" class="top-progress"></div>

  <header class="global-header">
    <div class="header-content" style="display:flex; justify-content:space-between; width:100%; max-width:1100px; margin:0 auto; align-items:center;">
      <button class="btn-premium" onclick="location.href='../index.html'" style="background:none; border:1px solid var(--border); color:var(--text-main); font-size:0.85rem;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        <span>Voltar</span>
      </button>
      
      <div class="header-title">
        <span class="brand-name" style="font-family:'Outfit', sans-serif; font-weight:700; font-size:1.1rem;">Simulado Geral</span>
      </div>

      <button id="themeToggle" class="theme-btn" aria-label="Alterar Tema" style="background:none; border:none; cursor:pointer; padding:8px; border-radius:50%; display:flex; align-items:center; justify-content:center; transition:var(--transition); color:var(--text-main);">
        <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none; color:#facc15;"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
    </div>
  </header>

  <main class="container">
    <div id="uploadArea" class="upload-section glass">
      <div class="upload-content">
        <span style="font-size: 3rem; display: block; margin-bottom: 1rem;">📁</span>
        <h3>Prepare seu Simulado</h3>
        <p>Selecione os arquivos de questões para começar o treinamento.</p>
        
        <div style="display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; margin-top: 1.5rem;">
          <label class="file-label" for="inputJson">Selecionar .json</label>
          <input type="file" id="inputJson" accept=".json" multiple>
          
          <label class="file-label" for="inputZip" style="background: var(--secondary);">Selecionar .zip</label>
          <input type="file" id="inputZip" accept=".zip" multiple>
        </div>
      </div>
    </div>

    <div id="container">
      <!-- Questions will be rendered here -->
      <div style="text-align: center; color: var(--text-muted);">
        <p>Aguardando upload de arquivos...</p>
      </div>
    </div>

    <div id="resultado"></div>
  </main>

  <audio id="audioCorreto" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>
  <audio id="audioErro" src="https://actions.google.com/sounds/v1/cartoon/cartoon_boing.ogg"></audio>

  <script>
    const savedTheme = localStorage.getItem('tema');
    if (savedTheme === 'escuro') document.body.classList.add('dark-mode');
  </script>
  <script src="../assets/js/simulado_base.js"></script>
  <script src="../assets/js/simulado_geral.js"></script>
</body>
</html>
